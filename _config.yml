# Site
name: "Stupid Blog"
title: "Stupid Blog"
description: "Blog written for no reason."
url: https://archie9211.github.io
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
baseurl: "" 
# google_analytics: '#'
disqus: 'nageenpawar'
# mailchimp-list: '#'
google_analytics: 'UA-141832283-1'
include: ["_pages"]
permalink: /:title/

# Authors
authors:
  Nageen:
    name: Nageen Chand
    display_name: Nageen Chand
    gravatar: 8603ba031f7745fc3a739cce5ed5d507
    email: nageen523@gmail.com
    web: https://archie9211.github.io/
    twitter: https://twitter.com/nageen9211
    description: "Author of this blog"
    
# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination 
paginate: 6
paginate_path: /page:num/
    
# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
adsense: "enabled"
adsense-data-ad-client: "ca-pub-4243472451356722"
adsense-data-ad-slot: "#"

# Lazy Images ("enabled" or "disabled")
lazyimages: "enabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
